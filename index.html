<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KIVUSTREAM | Watch Movies, TV Shows & Anime</title>

<meta name="description" content="Premium Movie Streaming Platform">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/home.css">

</head>

<body>
<!--================ LOADER ================-->

<div id="loader">

    <div class="spinner"></div>

    <h2>KIVUSTREAM</h2>

</div>

<!--================ NAVBAR ================-->

<header>

<nav class="navbar">

<div class="logo">

<i class="fa-solid fa-film"></i>

<span>KIVUSTREAM</span>

</div>

<ul class="nav-links">

<li><a href="#">Home</a></li>

<li><a href="#">Movies</a></li>

<li><a href="#">Series</a></li>

<li><a href="#">Anime</a></li>

<li><a href="#">My List</a></li>

</ul>

<div class="nav-right">

<div class="search-box">

<i class="fa-solid fa-search"></i>

<input
type="text"
placeholder="Search Movies...">

</div>

<button class="login-btn">

Login

</button>

</div>

</nav>

</header>

<!--================ HERO ================-->

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<span class="featured">

FEATURED TODAY

</span>
<h1 id="heroTitle">Loading...</h1>

<div class="hero-meta" id="heroMeta"></div>

<p id="heroDescription">
Loading featured content...
</p>

<div class="hero-buttons">

<a href="#" class="watch-btn" id="heroWatchBtn">
    <i class="fa-solid fa-play"></i>
    Watch Now
</a>
<button class="trailer-btn" id="heroTrailerBtn">
    <i class="fa-solid fa-video"></i>
    Trailer
</button>

</div>

</div>

</section>

<!--================ TRENDING ================-->

<section class="movie-section">

<h2>

🔥 Trending Now

</h2>

<div class="movie-grid">

<div class="movie-grid" id="trending"></div>
</section>

<!--================ RECOMMENDED ================-->

<section class="movie-section">

<h2>

⭐ Recommended For You

</h2>

<div class="movie-grid" id="recommended"></div>

</section>

<!--================ LATEST ================-->

<section class="movie-section">

<h2>

🎬 Latest Movies

</h2>

<div class="movie-grid" id="latest"></div>

</section>

<!--================ SERIES ================-->

<section class="movie-section">

<h2>

📺 TV Shows

</h2>

<div class="movie-grid" id="series"></div>

</section>

<!--================ ANIME ================-->

<section class="movie-section">

<h2>

🍿 Anime

</h2>

<div class="movie-grid" id="anime"></div>

</section>

<!--================ FOOTER ================-->

<footer>

<div class="footer-logo">

KIVUSTREAM

</div>

<p>

Unlimited Movies, TV Shows & Anime.

</p>

<div class="socials">

<i class="fab fa-facebook"></i>

<i class="fab fa-instagram"></i>

<i class="fab fa-twitter"></i>

<i class="fab fa-github"></i>

</div>

<p class="copyright">

© 2026 KIVUSTREAM

</p>

</footer>

<!--================ BACK TO TOP ================-->

<button id="topBtn">
    <i class="fa-solid fa-arrow-up"></i>
</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>
<script src="supabase.js"></script>

<script type="module" src="js/app.js"></script>
</body>
</html>
